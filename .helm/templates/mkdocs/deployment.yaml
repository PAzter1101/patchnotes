apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "patchnotes.fullname" . }}-mkdocs
  labels:
    {{- include "patchnotes.labels" . | nindent 4 }}
    app.kubernetes.io/component: mkdocs
spec:
  replicas: {{ .Values.mkdocs.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mkdocs
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mkdocs
    spec:
      containers:
        - name: mkdocs
          image: "{{ .Values.mkdocs.image.repository }}:{{ .Values.mkdocs.image.tag }}"
          imagePullPolicy: {{ .Values.mkdocs.image.pullPolicy }}
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.mkdocs.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /docs/docs/blog/posts
              subPath: posts
            - name: data
              mountPath: /docs/mkdocs.yml
              subPath: mkdocs.yml
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "patchnotes.fullname" . }}-data
