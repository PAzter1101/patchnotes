apiVersion: v1
kind: Service
metadata:
  name: {{ include "patchnotes.fullname" . }}-admin
  labels:
    {{- include "patchnotes.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  ports:
    - port: 8501
      targetPort: 8501
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin
