admin:
  image:
    repository: ghcr.io/pazter1101/patchnotes-admin
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
    host: admin.patchnotes.example.com
    tls: true
    clusterIssuer: letsencrypt-prod
    ingressClassName: nginx
  auth:
    username: admin
    password: ""  # обязательно задать при деплое

mkdocs:
  image:
    repository: ghcr.io/pazter1101/patchnotes-mkdocs
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: false
    host: patchnotes.example.com
    tls: true
    clusterIssuer: letsencrypt-prod
    ingressClassName: nginx

storage:
  size: 1Gi
  storageClassName: ""
  accessMode: ReadWriteMany

secrets:
  llmApiKey: ""
  gitToken: ""
