site_name: Patchnotes
site_url: ""

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.top

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      archive_date_format: MMMM yyyy
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date

nav:
  - Главная: index.md
  - Блог: blog/index.md
